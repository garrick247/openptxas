name: corpus

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus:
    name: corpus (compile + GPU sweep, RTX 5090 / SM_120)
    runs-on: [self-hosted, gpu, cuda]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build venv + install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          # Sibling local deps not on PyPI; runner is the linux box
          # where all garrick247 repos are cloned at /home/garrick/<repo>.
          # Install openptxas first (forge-workbench depends on it).
          .venv/bin/pip install -q -e .
          .venv/bin/pip install -q -e /home/garrick/forge-workbench
      - name: corpus compile check
        run: .venv/bin/python scripts/corpus_compile_check.py
      - name: corpus execution sweep
        run: .venv/bin/python scripts/corpus_sweep.py
